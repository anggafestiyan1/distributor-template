{% extends "base.html" %}
{% block title %}Export Master Data{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <h4 class="mb-3"><i class="bi bi-download me-2"></i>Export Master Data</h4>
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-download"></i> Download
            </button>
            <a href="{% url 'master_data:record_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
