{% if page_obj.has_other_pages %}
<nav aria-label="Page navigation" class="mt-3">
  <ul class="pagination pagination-sm mb-0">
    {% if page_obj.has_previous %}
      <li class="page-item">
        <a class="page-link" href="?{% include 'partials/_qs_replace.html' with key='page' value=page_obj.previous_page_number %}">
          &laquo; Prev
        </a>
      </li>
    {% endif %}
    <li class="page-item disabled">
      <span class="page-link">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    </li>
    {% if page_obj.has_next %}
      <li class="page-item">
        <a class="page-link" href="?{% include 'partials/_qs_replace.html' with key='page' value=page_obj.next_page_number %}">
          Next &raquo;
        </a>
      </li>
    {% endif %}
  </ul>
</nav>
{% endif %}
